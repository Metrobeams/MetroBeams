name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  test:
    name: Test, quality and assets
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plataforma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124
        with:
          otp-version: "29"
          elixir-version: "1.20.2"

      - name: Restore dependencies and build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-otp-29-elixir-1.20.2-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-29-elixir-1.20.2-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install --yes imagemagick
          if ! command -v magick >/dev/null; then
            echo "$GITHUB_WORKSPACE/.github/scripts" >> "$GITHUB_PATH"
          fi

      - name: Run tests
        run: mix test

      - name: Install JavaScript dependencies
        run: npm ci --prefix assets

      - name: Install asset tools
        run: mix assets.setup

      - name: Build Tailwind and esbuild assets
        run: mix assets.build
